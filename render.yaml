services:
  - type: web
    name: linkedin
    dir: ./server
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        scope: run
      - key: JWT_SECRET
        scope: run
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: production
