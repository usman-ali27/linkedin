services:
  - type: web
    name: linkedin
    rootDir: ./server # ← was "dir", which Render doesn't recognize
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        scope: run
      - key: JWT_SECRET
        scope: run
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: production
